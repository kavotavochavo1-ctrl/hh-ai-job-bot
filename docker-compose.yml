services:
  bot:
    build:
      context: .
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
    volumes:
      - bot-data:/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-m", "hh_job_bot.healthcheck"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
